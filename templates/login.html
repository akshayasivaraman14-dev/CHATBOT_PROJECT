<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(135deg,#0f172a,#1e1b4b,#4c1d95,#db2777);
    overflow:hidden;
    color:white;
}

/* glowing background effects */
body::before,
body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
}

body::before{
    background:#a855f7;
    top:-100px;
    left:-100px;
}

body::after{
    background:#ec4899;
    bottom:-120px;
    right:-120px;
}

/* login card */
form{
    position:relative;
    z-index:1;

    width:350px;
    padding:35px;

    background:rgba(17,24,39,0.65);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;

    box-shadow:0 0 40px rgba(168,85,247,0.25);
    display:flex;
    flex-direction:column;
    gap:15px;

    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

form::before{
    content:"🔐 Admin Login";
    font-size:22px;
    font-weight:600;
    text-align:center;
    margin-bottom:10px;
    color:#f9a8d4;
}

/* inputs */
input{
    padding:12px 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);

    background:rgba(255,255,255,0.06);
    color:white;
    outline:none;

    transition:0.3s;
}

input:focus{
    border-color:#a855f7;
    box-shadow:0 0 10px rgba(168,85,247,0.4);
}

/* button */
button{
    margin-top:10px;
    padding:12px;

    border:none;
    border-radius:12px;

    cursor:pointer;
    font-weight:600;
    color:white;

    background:linear-gradient(135deg,#ec4899,#a855f7);
    box-shadow:0 0 20px rgba(168,85,247,0.35);

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px rgba(168,85,247,0.6);
}

/* small helper text feel */
input::placeholder{
    color:#cbd5e1;
}

/* mobile */
@media(max-width:500px){
    form{
        width:90%;
        padding:25px;
    }
}
</style>
</head>

<body>

<form action="/admin-login" method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
