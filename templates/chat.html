<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(
        135deg,
        #0f172a 0%,
        #1e1b4b 30%,
        #4c1d95 70%,
        #db2777 100%
    );
    color:white;
}

.container{
    display:flex;
    height:100vh;
}

.sidebar{
    width:280px;
    background:rgba(17,24,39,0.75);
    backdrop-filter:blur(20px);
    border-right:1px solid rgba(255,255,255,0.08);
    padding:20px;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:22px;
    font-weight:700;
    margin-bottom:25px;
    color:#f9a8d4;
}

.new-chat{
    background:linear-gradient(135deg,#ec4899,#a855f7);
    border:none;
    color:white;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    margin-bottom:20px;
}

.history-title{
    font-size:14px;
    color:#cbd5e1;
    margin-bottom:10px;
}

.history-item{
    padding:12px;
    border-radius:12px;
    margin-bottom:8px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
    transition:.3s;
}

.history-item:hover{
    background:rgba(168,85,247,0.25);
}

.chat-area{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    background:rgba(17,24,39,0.4);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.header-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.bot-icon{
    width:40px;
    height:40px;
    border-radius:50%;
    background:linear-gradient(135deg,#ec4899,#a855f7);
    display:flex;
    align-items:center;
    justify-content:center;
}

.header-title{
    font-size:20px;
    font-weight:600;
}

.header-right{
    display:flex;
    gap:10px;
}

.top-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:25px;
    scroll-behavior:smooth;
}

.bot,
.user{
    max-width:75%;
    padding:15px;
    margin:12px 0;
    border-radius:18px;
    animation:fadeIn .25s ease;
    word-wrap:break-word;
}

.bot{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.user{
    margin-left:auto;
    background:linear-gradient(135deg,#ec4899,#a855f7);
    box-shadow:0 0 15px rgba(168,85,247,.35);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.input-box{
    padding:18px;
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(17,24,39,0.4);
    backdrop-filter:blur(20px);
    border-top:1px solid rgba(255,255,255,0.08);
}

.icon-btn{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:18px;
    transition:.3s;
}

.icon-btn:hover{
    background:#a855f7;
    transform:scale(1.05);
}

.input-wrapper{
    flex:1;
    display:flex;
    align-items:center;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:10px 15px;
}

.input-wrapper input{
    width:100%;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:15px;
}

.send-btn{
    width:52px;
    height:52px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    color:white;
    font-size:18px;
    background:linear-gradient(135deg,#ec4899,#a855f7);
    box-shadow:0 0 20px rgba(168,85,247,.4);
}

.ticket-box{
    margin-top:10px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
}

.ticket-box input{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    border:none;
    outline:none;
    border-radius:10px;
}

.ticket-box button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#ec4899,#a855f7);
    color:white;
    cursor:pointer;
}

@media(max-width:768px){
    .sidebar{display:none;}
    .bot,.user{max-width:90%;}
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo">🤖LOG BOT</div>

        <button class="new-chat" onclick="newChat()">
            + New Chat
        </button>

        <div class="history-title">Recent Chats</div>

        <div class="history-item">🖨 Printer Issue</div>
        <div class="history-item">🔐 VPN Issue</div>
        <div class="history-item">⚙ NETWORK ERROR</div>

    </div>

    <!-- CHAT AREA -->
    <div class="chat-area">

        <div class="header">

            <div class="header-left">
                <div class="bot-icon">🤖</div>
                <div class="header-title"> AI Assistant</div>
            </div>

            <div class="header-right">
                <button class="top-btn">🔔</button>
                <button class="top-btn">⚙</button>
            </div>

        </div>

        <div class="messages" id="chatBox">
            <div class="bot">👋 Hello! I am logbot🤖.....what's up budyyy???How can I help you today?</div>
        </div>

        <div class="input-box">

            <button class="icon-btn">📎</button>

            <div class="input-wrapper">
                <input id="msg" placeholder="ASK YOUR ISSUES...">
            </div>

            <button class="icon-btn">🎤</button>

            <!-- NEW TICKET BUTTON -->
            <button class="icon-btn" onclick="showTicketBox()">🎫</button>

            <button class="send-btn" onclick="send()">➤</button>

        </div>

    </div>
</div>

<script>

/* =========================
   ORIGINAL SEND LOGIC (UNCHANGED)
========================= */

async function send(){

    let input=document.getElementById("msg");
    let text=input.value;

    if(text==="") return;

    let box=document.getElementById("chatBox");

    box.innerHTML += `<div class='user'>${text}</div>`;
    input.value="";
    box.scrollTop = box.scrollHeight;

    if(text.toLowerCase().includes("raise ticket")){

        box.innerHTML += `
        <div class='bot'>
            <div class='ticket-box'>
                <h4>🛠 Raise Ticket</h4>

                <input id="t1" placeholder="Title">
                <input id="t2" placeholder="Description">

                <button onclick="submitTicket()">
                    Submit
                </button>

            </div>
        </div>`;

        box.scrollTop = box.scrollHeight;
        return;
    }

    box.innerHTML += `<div class='bot'>Thinking...</div>`;
    box.scrollTop = box.scrollHeight;

    let res=await fetch("/ask",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:text})
    });

    let data=await res.json();

    document.querySelector(".bot:last-child").remove();

    box.innerHTML += `<div class='bot'>${data.reply}</div>`;
    box.scrollTop = box.scrollHeight;
}

/* =========================
   NEW FUNCTIONS ADDED
========================= */

function newChat(){

    let box=document.getElementById("chatBox");

    box.innerHTML=`
        <div class="bot">
            👋 Hello! How can I help you today?
        </div>
    `;

    document.getElementById("msg").value="";
}

function showTicketBox(){

    let box=document.getElementById("chatBox");

    box.innerHTML += `
    <div class='bot'>
        <div class='ticket-box'>
            <h4>🎫 Raise Ticket</h4>

            <input id="t1" placeholder="Issue Title">
            <input id="t2" placeholder="Issue Description">

            <button onclick="submitTicket()">
                Submit Ticket
            </button>
        </div>
    </div>`;

    box.scrollTop = box.scrollHeight;
}

/* =========================
   UPDATED SUBMIT TICKET
========================= */

async function submitTicket(){

    let title=document.getElementById("t1").value;
    let desc=document.getElementById("t2").value;

    let formData=new FormData();
    formData.append("name","User");
    formData.append("department","IT");
    formData.append("subject",title);
    formData.append("description",desc);

    await fetch("/raise-ticket",{
        method:"POST",
        body:formData
    });

    alert("✅ Ticket Raised Successfully");
}

/* ENTER KEY SUPPORT */
document.getElementById("msg")
.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        send();
    }
});
const micBtn = document.getElementById("micBtn");

const recognition =
new(window.SpeechRecognition ||
      window.webkitSpeechRecognition)();

recognition.lang = "en-US";

micBtn.onclick = () => {
    recognition.start();
};

recognition.onresult = (event) => {
    const text =
        event.results[0][0].transcript;

    document.getElementById("message").value = text;
};
function speak(text){

    const speech =
        new SpeechSynthesisUtterance(text);

    speech.rate = 1;

    window.speechSynthesis.speak(speech);
}
speak(reply);
if(document.getElementById("voiceToggle").checked){
    speak(reply);
}

</script>

</body>
</html>
