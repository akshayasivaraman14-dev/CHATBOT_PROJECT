<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e1b4b,#4c1d95,#db2777);
    min-height:100vh;
    color:white;
}

/* glowing blobs */
body::before,
body::after{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
}

body::before{
    background:#a855f7;
    top:-120px;
    left:-120px;
}

body::after{
    background:#ec4899;
    bottom:-120px;
    right:-120px;
}

/* =========================
   HEADER
========================= */

.header{
    position:relative;
    z-index:1;

    background:rgba(17,24,39,0.6);
    backdrop-filter:blur(20px);

    padding:18px 25px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border-bottom:1px solid rgba(255,255,255,0.08);
}

.header h1{
    font-size:20px;
    font-weight:600;
    color:#f9a8d4;
}

/* =========================
   BUTTON
========================= */

.btn{
    background:linear-gradient(135deg,#ec4899,#a855f7);
    color:white;
    padding:10px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
    box-shadow:0 0 20px rgba(168,85,247,0.3);
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px rgba(168,85,247,0.5);
}

/*=======================
   CONTAINER
========================= */

.container{
    position:relative;
    z-index:1;
    padding:25px;
}

/* =========================
   CARDS
========================= */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:rgba(17,24,39,0.55);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;

    padding:20px;
    text-align:center;

    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 30px rgba(168,85,247,0.25);
}

.card h3{
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:8px;
}

.card h1{
    font-size:34px;
    color:#f9a8d4;
}

/* =========================
   SECTIONS
========================= */

.section{
    background:rgba(17,24,39,0.55);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;

    padding:20px;
    margin-top:20px;
}

.section h2{
    font-size:18px;
    margin-bottom:15px;
    color:#f9a8d4;
}

/* =========================
   TABLES
========================= */

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:12px;
}

table th{
    background:linear-gradient(135deg,#a855f7,#ec4899);
    color:white;
    padding:12px;
    font-size:13px;
}

table td{
    padding:12px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    color:#e5e7eb;
}

table tr:hover td{
    background:rgba(168,85,247,0.08);
}

.status-open{
    color:#22c55e;
    font-weight:600;
}

/* =========================
   FOOTER
========================= */

.footer{
    text-align:center;
    margin:30px 0 20px;
    color:#cbd5e1;
    font-size:13px;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){
    .header h1{
        font-size:16px;
    }

    .cards{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <h1>🤖logbot Admin Dashboard</h1>

    <button class="btn" onclick="window.location.href='/chat'">
        Open Chat
    </button>

</div>

<!-- MAIN -->
<div class="container">

    <!-- STATS -->
    <div class="cards">

        <div class="card">
            <h3>Total Chats</h3>
            <h1 id="totalChats">0</h1>
        </div>

        <div class="card">
            <h3>Total Tickets</h3>
            <h1 id="totalTickets">0</h1>
        </div>

        <div class="card">
            <h3>Open Tickets</h3>
            <h1 id="openTickets">0</h1>
        </div>

    </div>

    <!-- TICKETS -->
    <div class="section">

        <h2>🎫 Raised Tickets</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Subject</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody id="ticketTable"></tbody>
        </table>

    </div>

    <!-- CHATS -->
    

    <!-- INFO -->
    <div class="section">

        <h2>📌 Ticket Information</h2>

        <table>
            <thead>
                <tr>
                    <th>Status</th>
                    <th>Info</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td class="status-open">Open</td>
                    <td>Ticket management coming next</td>
                </tr>
            </tbody>
        </table>

    </div>

</div>

<div class="footer">
    <p>LOGBOT🤖 Dashboard</p>
</div>

<!-- =========================
     YOUR ORIGINAL LOGIC (UNCHANGED)
========================= -->

<script>

async function loadStats(){

    try{

        const response = await fetch("/stats");
        const data = await response.json();

        document.getElementById("totalChats").innerText = data.total_chats;
        document.getElementById("totalTickets").innerText = data.total_tickets;
        document.getElementById("openTickets").innerText = data.open_tickets;

    }catch(error){
        console.log(error);
    }

}

loadStats();

</script>

<script>

async function loadTickets(){

    const response = await fetch("/tickets");
    const tickets = await response.json();

    let html = "";

    tickets.forEach(ticket => {

        html += `
        <tr>
            <td>${ticket[0]}</td>
            <td>${ticket[1]}</td>
            <td>${ticket[2]}</td>
            <td>${ticket[3]}</td>
            <td>${ticket[4]}</td>
            <td>${ticket[5]}</td>
        </tr>
        `;

    });

    document.getElementById("ticketTable").innerHTML = html;
}

loadTickets();

</script>

</body>
</html>
